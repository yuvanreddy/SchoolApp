<!DOCTYPE html>
<html>
<head>
    <title>School Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>School Dashboard</h1>

    <div class="grid">
        <div class="card">Attendance</div>
        <div class="card">Calendar</div>
        <div class="card">Class Work</div>
        <div class="card">Assignments</div>
        <div class="card">Digital Content</div>
        <div class="card">Progress Report</div>
        <div class="card">Time Table</div>
        <div class="card">Showcase</div>
        <div class="card">Notifications</div>
        <div class="card">Settings</div>
        <div class="card">Profile</div>
    </div>

    <div id="notifications"></div>

    <button id="send-notification">Send Test Notification</button>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
