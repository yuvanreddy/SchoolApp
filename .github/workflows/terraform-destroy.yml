name: Terraform Destroy - Infrastructure Cleanup

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "DESTROY" to confirm complete infrastructure destruction'
        required: true
        default: 'no'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: schoolapp-backend
  ECR_REPOSITORY_FRONTEND: schoolapp-frontend
  EKS_CLUSTER_NAME: schoolapp-cluster
  TF_VAR_db_username: yuvan
  TF_VAR_db_password: JasWik2325

jobs:
  terraform_destroy:
    name: 'Destroy AWS Infrastructure'
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm_destroy == 'DESTROY'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    - name: Import existing resources for proper destruction
      working-directory: ./terraform
      run: |
        echo "Importing existing resources for destruction..."

        # Import resources that might exist to ensure proper cleanup
        terraform import -var="db_username=${{ env.TF_VAR_db_username }}" -var="db_password=${{ env.TF_VAR_db_password }}" aws_eks_cluster.schoolapp schoolapp-cluster 2>/dev/null || echo "EKS cluster not found"
        terraform import -var="db_username=${{ env.TF_VAR_db_username }}" -var="db_password=${{ env.TF_VAR_db_password }}" aws_eks_node_group.schoolapp schoolapp-cluster:schoolapp-node-group 2>/dev/null || echo "EKS node group not found"
        terraform import -var="db_username=${{ env.TF_VAR_db_username }}" -var="db_password=${{ env.TF_VAR_db_password }}" aws_iam_role.eks schoolapp-eks-role 2>/dev/null || echo "EKS role not found"
        terraform import -var="db_username=${{ env.TF_VAR_db_username }}" -var="db_password=${{ env.TF_VAR_db_password }}" aws_iam_role.node schoolapp-node-role 2>/dev/null || echo "Node role not found"
        terraform import -var="db_username=${{ env.TF_VAR_db_username }}" -var="db_password=${{ env.TF_VAR_db_password }}" aws_db_instance.schoolapp schoolapp-db 2>/dev/null || echo "RDS instance not found"
        terraform import -var="db_username=${{ env.TF_VAR_db_username }}" -var="db_password=${{ env.TF_VAR_db_password }}" aws_db_subnet_group.schoolapp schoolapp-db-subnet 2>/dev/null || echo "DB subnet group not found"

        # Import VPC if exists
        VPC_ID=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=schoolapp-vpc" --query 'Vpcs[0].VpcId' --output text --region ${{ env.AWS_REGION }} 2>/dev/null)
        if [ "$VPC_ID" != "None" ] && [ -n "$VPC_ID" ]; then
          terraform import -var="db_username=${{ env.TF_VAR_db_username }}" -var="db_password=${{ env.TF_VAR_db_password }}" aws_vpc.main $VPC_ID 2>/dev/null || echo "VPC not found"
        fi

        echo "Import complete. Proceeding with destruction..."

    - name: Terraform Plan Destroy
      working-directory: ./terraform
      run: terraform plan -destroy -var="db_username=${{ env.TF_VAR_db_username }}" -var="db_password=${{ env.TF_VAR_db_password }}" -out=destroy.tfplan

    - name: Terraform Destroy
      working-directory: ./terraform
      run: terraform destroy -var="db_username=${{ env.TF_VAR_db_username }}" -var="db_password=${{ env.TF_VAR_db_password }}" --auto-approve

    - name: Verify Resources Destroyed
      run: |
        echo "Verifying resource cleanup..."

        # Check if resources are destroyed
        if aws eks describe-cluster --name schoolapp-cluster --region ${{ env.AWS_REGION }} 2>/dev/null; then
          echo "⚠️ EKS cluster still exists"
        else
          echo "✅ EKS cluster destroyed"
        fi

        if aws rds describe-db-instances --db-instance-identifier schoolapp-db --region ${{ env.AWS_REGION }} 2>/dev/null; then
          echo "⚠️ RDS instance still exists"
        else
          echo "✅ RDS instance destroyed"
        fi

        ROLES=$(aws iam list-roles --query 'Roles[?RoleName==`schoolapp-eks-role` || RoleName==`schoolapp-node-role`].RoleName' --output text 2>/dev/null)
        if [ -n "$ROLES" ]; then
          echo "⚠️ IAM roles still exist: $ROLES"
        else
          echo "✅ IAM roles destroyed"
        fi

        echo ""
        echo "🧹 Infrastructure cleanup complete!"
        echo "All SchoolApp AWS resources have been destroyed."
