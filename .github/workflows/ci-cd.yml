name: Full Stack Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Destroy infrastructure?'
        required: false
        default: 'false'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: schoolapp-backend
  ECR_REPOSITORY_FRONTEND: schoolapp-frontend
  EKS_CLUSTER_NAME: schoolapp-cluster
  TF_VAR_db_username: yuvan
  TF_VAR_db_password: JasWik2325

jobs:
  terraform:
    name: 'Terraform Infrastructure'
    runs-on: ubuntu-latest
    outputs:
      alb-url: ${{ steps.alb-url.outputs.url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    - name: Terraform Validate
      working-directory: ./terraform
      run: terraform validate

    - name: Terraform Plan
      working-directory: ./terraform
      run: terraform plan -out=tfplan

    - name: Cleanup existing AWS resources (if any)
      run: |
        echo "Starting comprehensive cleanup..."
        
        # Delete EKS cluster first (required before deleting IAM roles)
        if aws eks describe-cluster --name schoolapp-cluster --region ${{ env.AWS_REGION }} 2>/dev/null; then
          echo "Deleting EKS cluster..."
          aws eks delete-cluster --name schoolapp-cluster --region ${{ env.AWS_REGION }}
          
          # Wait for cluster deletion
          echo "Waiting for EKS cluster deletion..."
          aws eks wait cluster-deleted --name schoolapp-cluster --region ${{ env.AWS_REGION }}
        fi
        
        # Delete RDS instances (required before deleting DB subnet group)
        for db_instance in $(aws rds describe-db-instances --region ${{ env.AWS_REGION }} --query 'DBInstances[?starts_with(DBInstanceIdentifier, `schoolapp-db`)].DBInstanceIdentifier' --output text 2>/dev/null); do
          echo "Deleting RDS instance: $db_instance"
          aws rds delete-db-instance --db-instance-identifier $db_instance --skip-final-snapshot --region ${{ env.AWS_REGION }}
          
          # Wait for deletion
          echo "Waiting for RDS instance $db_instance deletion..."
          aws rds wait db-instance-deleted --db-instance-identifier $db_instance --region ${{ env.AWS_REGION }}
        done
        
        # Function to clean up IAM role
        cleanup_role() {
          local role_name=$1
          echo "Checking role: $role_name"
          
          if aws iam get-role --role-name "$role_name" --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Deleting $role_name..."
            
            # Detach all managed policies
            for policy_arn in $(aws iam list-attached-role-policies --role-name "$role_name" --query 'AttachedPolicies[*].PolicyArn' --output text 2>/dev/null); do
              echo "Detaching managed policy: $policy_arn"
              aws iam detach-role-policy --role-name "$role_name" --policy-arn "$policy_arn" 2>/dev/null || echo "Failed to detach $policy_arn"
            done
            
            # Delete all inline policies
            for policy_name in $(aws iam list-role-policies --role-name "$role_name" --query 'PolicyNames[*]' --output text 2>/dev/null); do
              echo "Deleting inline policy: $policy_name"
              aws iam delete-role-policy --role-name "$role_name" --policy-name "$policy_name" 2>/dev/null || echo "Failed to delete inline policy $policy_name"
            done
            
            # Remove from instance profiles if any
            for profile_name in $(aws iam list-instance-profiles-for-role --role-name "$role_name" --query 'InstanceProfiles[*].InstanceProfileName' --output text 2>/dev/null); do
              echo "Removing from instance profile: $profile_name"
              aws iam remove-role-from-instance-profile --instance-profile-name "$profile_name" --role-name "$role_name" 2>/dev/null || echo "Failed to remove from profile $profile_name"
            done
            
            # Finally delete the role
            aws iam delete-role --role-name "$role_name" 2>/dev/null && echo "Successfully deleted $role_name" || echo "Failed to delete $role_name"
          else
            echo "Role $role_name does not exist"
          fi
        }
        
        # Clean up IAM roles
        cleanup_role "schoolapp-eks-role"
        cleanup_role "schoolapp-node-role"
        
        # Delete DB subnet group
        aws rds delete-db-subnet-group --db-subnet-group-name schoolapp-db-subnet --region ${{ env.AWS_REGION }} 2>/dev/null || echo "DB subnet group schoolapp-db-subnet does not exist"
        
        echo "Cleanup complete. Waiting for changes to propagate..."
        sleep 30

    - name: Terraform Apply
      if: github.event.inputs.destroy != 'true'
      working-directory: ./terraform
      run: terraform apply -auto-approve tfplan

    - name: Get ALB URL
      if: github.event.inputs.destroy != 'true'
      id: alb-url
      run: |
        sleep 30  # Wait for ALB to be ready
        ALB_URL=$(aws elbv2 describe-load-balancers --region ${{ env.AWS_REGION }} --query 'LoadBalancers[?contains(LoadBalancerName, `schoolapp`)].DNSName' --output text)
        echo "url=$ALB_URL" >> $GITHUB_OUTPUT
        echo "ALB URL: $ALB_URL"

    - name: Terraform Destroy
      if: github.event.inputs.destroy == 'true'
      working-directory: ./terraform
      run: terraform destroy -auto-approve

  build-and-deploy:
    name: 'Build and Deploy App'
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event.inputs.destroy != 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Get AWS Account ID
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Create ECR repositories
      run: |
        aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY_BACKEND }} || aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY_BACKEND }}
        aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY_FRONTEND }} || aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY_FRONTEND }}

    - name: Build and push backend image
      run: |
        cd backend
        ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_BACKEND }}:$GITHUB_SHA .
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_BACKEND }}:$GITHUB_SHA
        docker tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY_BACKEND }}:$GITHUB_SHA $ECR_REGISTRY/${{ env.ECR_REPOSITORY_BACKEND }}:latest
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_BACKEND }}:latest

    - name: Build and push frontend image
      run: |
        cd frontend
        ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:$GITHUB_SHA .
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:$GITHUB_SHA
        docker tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:$GITHUB_SHA $ECR_REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:latest
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:latest

    - name: Update Kubernetes manifests
      run: |
        ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        sed -i "s|YOUR_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com|$ECR_REGISTRY|g" k8s/deployment.yml
        sed -i 's|latest|'$GITHUB_SHA'|g' k8s/deployment.yml

    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/secrets.yml --validate=false
        kubectl apply -f k8s/deployment.yml --validate=false

    - name: Wait for deployment
      run: |
        kubectl rollout status deployment/schoolapp-backend -n default --timeout=300s
        kubectl rollout status deployment/schoolapp-frontend -n default --timeout=300s

    - name: Display Final URLs
      run: |
        echo "🎉 Deployment Complete!"
        echo "Frontend URL: http://${{ needs.terraform.outputs.alb-url }}"
        echo "Backend API: http://${{ needs.terraform.outputs.alb-url }}/api"
        echo ""
        echo "Test real-time notifications:"
        echo "- Open the frontend URL"
        echo "- Click 'Send Test Notification'"
        echo "- See live updates via WebSocket!"
