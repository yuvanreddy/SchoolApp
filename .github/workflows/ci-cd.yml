name: SchoolApp CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t school-app .

    - name: Run Container
      run: |
        docker-compose down || true
        docker-compose up -d

    - name: Test API
      run: |
        sleep 10  # Wait for container to start
        curl http://localhost:5000
